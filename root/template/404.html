<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحه پیدا نشد | مجله من</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            direction: rtl;
            padding: 20px;
        }
        
        .container {
            background: white;
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        
        .error-code {
            font-size: 120px;
            font-weight: 900;
            color: #e8ecf1;
            line-height: 1;
            margin-bottom: -20px;
            user-select: none;
        }
        
        .icon {
            font-size: 80px;
            display: block;
            margin: 10px 0;
        }
        
        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }
        
        p {
            color: #666;
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 25px;
        }
        
        .buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 30px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #1a73e8;
            color: white;
        }
        
        .btn-primary:hover {
            background: #1557b0;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: #f0f4ff;
            color: #1a73e8;
        }
        
        .btn-secondary:hover {
            background: #e0e8ff;
        }
        
        .search-box {
            margin: 20px 0;
            display: flex;
            gap: 10px;
        }
        
        .search-box input {
            flex: 1;
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .search-box input:focus {
            border-color: #1a73e8;
        }
        
        .search-box button {
            padding: 10px 25px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            transition: background 0.3s;
        }
        
        .search-box button:hover {
            background: #1557b0;
        }
        
        .footer {
            margin-top: 25px;
            color: #aaa;
            font-size: 13px;
        }
        
        .footer a {
            color: #1a73e8;
            text-decoration: none;
        }
        
        @media (max-width: 500px) {
            .container {
                padding: 30px 20px;
            }
            
            .error-code {
                font-size: 80px;
            }
            
            .icon {
                font-size: 60px;
            }
            
            h1 {
                font-size: 22px;
            }
            
            .search-box {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">404</div>
        <span class="icon">🔍</span>
        <h1>صفحه پیدا نشد</h1>
        <p>
            متأسفیم! صفحه‌ای که به دنبال آن هستید وجود ندارد یا حذف شده است.
            <br>
            شاید لینک اشتباه وارد شده باشد.
        </p>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="جستجو در مطالب ...">
            <button onclick="search()">🔍 جستجو</button>
        </div>
        
        <div class="buttons">
            <a href="index.html" class="btn btn-primary">🏠 صفحه اصلی</a>
            <a href="archive.html" class="btn btn-secondary">📚 آرشیو</a>
        </div>
        
        <div class="footer">
            <p>© ۱۴۰۵ - <a href="index.html">مجله من</a></p>
        </div>
    </div>
    
    <script>
        function search() {
            const query = document.getElementById('searchInput').value.trim();
            if (query.length < 2) {
                alert('حداقل ۲ کاراکتر وارد کنید');
                return;
            }
            window.location.href = `archive.html?q=${encodeURIComponent(query)}`;
        }
        
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                search();
            }
        });
    </script>
</body>
</html>
