<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Worker | ربات تولید صفحات HTML</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #0d47a1 0%, #1976d2 50%, #42a5f5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            direction: rtl;
        }
        
        .container {
            background: white;
            border-radius: 24px;
            padding: 50px 35px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 30px 80px rgba(0,0,0,0.35);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #0d47a1, #42a5f5, #0d47a1);
            background-size: 200% 100%;
            animation: gradientMove 3s ease-in-out infinite;
        }
        
        @keyframes gradientMove {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .logo {
            font-size: 80px;
            margin-bottom: 10px;
            display: block;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .badge-google {
            display: inline-block;
            background: #e8f0fe;
            color: #1a73e8;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
            border: 1px solid #1a73e8;
        }
        
        h1 {
            color: #0d47a1;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 5px;
        }
        
        h1 span {
            background: linear-gradient(135deg, #0d47a1, #42a5f5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            color: #555;
            font-size: 15px;
            margin-bottom: 25px;
            line-height: 1.8;
        }
        
        .features {
            text-align: right;
            margin: 20px 0 25px;
            padding: 0 5px;
        }
        
        .feature-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
            color: #333;
            font-size: 15px;
            transition: background 0.2s;
            border-radius: 8px;
            padding-right: 10px;
        }
        
        .feature-item:hover {
            background: #f5f9ff;
        }
        
        .feature-item:last-child {
            border-bottom: none;
        }
        
        .feature-icon {
            font-size: 22px;
            min-width: 35px;
        }
        
        .feature-text {
            flex: 1;
        }
        
        .feature-tag {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .cta-button {
            display: inline-block;
            background: linear-gradient(135deg, #0d47a1, #1976d2);
            color: white;
            padding: 16px 50px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 18px;
            font-weight: 700;
            margin-top: 10px;
            transition: all 0.3s;
            box-shadow: 0 6px 25px rgba(25, 118, 210, 0.45);
            width: 100%;
        }
        
        .cta-button:active {
            transform: scale(0.97);
        }
        
        .footer {
            margin-top: 25px;
            color: #aaa;
            font-size: 13px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        
        .footer a {
            color: #1a73e8;
            text-decoration: none;
            font-weight: 600;
        }
        
        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #4caf50;
            border-radius: 50%;
            animation: blink 1.5s ease-in-out infinite;
            margin-left: 8px;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .status-text {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #4caf50;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="logo">🤖</span>
        
        <div class="badge-google">⚡ Google Worker</div>
        
        <h1>
            <span>Google Worker</span>
        </h1>
        <p class="subtitle">
            پیام‌های تلگرام را به صفحات HTML زیبا تبدیل کرده<br>
            و در گوگل ایندکس می‌کند
        </p>
        
        <div class="status-text">
            <span class="status-dot"></span>
            آنلاین و آماده انتشار
        </div>
        
        <div class="features">
            <div class="feature-item">
                <span class="feature-icon">📱</span>
                <span class="feature-text">طراحی موبایل‌فرندلی</span>
                <span class="feature-tag">responsive</span>
            </div>
            <div class="feature-item">
                <span class="feature-icon">⚡</span>
                <span class="feature-text">انتشار فوری در گیت‌هاب</span>
                <span class="feature-tag">auto</span>
            </div>
            <div class="feature-item">
                <span class="feature-icon">🔗</span>
                <span class="feature-text">دریافت لینک اختصاصی</span>
                <span class="feature-tag">unique</span>
            </div>
            <div class="feature-item">
                <span class="feature-icon">🌐</span>
                <span class="feature-text">ایندکس شدن در گوگل</span>
                <span class="feature-tag">SEO</span>
            </div>
        </div>
        
        <a href="https://t.me/GoogleWorkerBot" class="cta-button">
            🚀 شروع کنید
        </a>
        
        <div class="footer">
            ساخته شده با ❤️ توسط <a href="https://github.com/trendnevis">trendnevis</a>
        </div>
    </div>
</body>
</html>
